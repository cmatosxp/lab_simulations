<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Linux Terminal — Advanced</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }
        #screen, #input-display, #terminal-input {
            font-family: 'Fira Code', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }
        #screen::-webkit-scrollbar, #missions::-webkit-scrollbar { width: 8px; }
        #screen::-webkit-scrollbar-track, #missions::-webkit-scrollbar-track { background: #0f172a; }
        #screen::-webkit-scrollbar-thumb, #missions::-webkit-scrollbar-thumb { background-color: #475569; border-radius: 4px; }
        #screen::-webkit-scrollbar-thumb:hover, #missions::-webkit-scrollbar-thumb:hover { background-color: #64748b; }
        #cursor {
            display: inline-block; width: 8px; height: 1.1em; background-color: #f8fafc;
            animation: blink 1s step-end infinite; vertical-align: text-bottom;
        }
        @keyframes blink { from, to { background-color: transparent; } 50% { background-color: #f8fafc; } }
        #terminal-input { position: absolute; left: -9999px; width: 1px; height: 1px; opacity: 0; }
        .mission-done { text-decoration: line-through; opacity: 0.55; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-4">

    <div class="max-w-7xl mx-auto">
        <header class="mb-4">
            <div class="flex flex-col md:flex-row md:items-start md:justify-between gap-3">
                <div>
            <p class="text-xs font-semibold uppercase tracking-widest text-cyan-400">Linux learning range</p>
            <h1 class="text-2xl md:text-3xl font-bold text-emerald-400">Interactive Linux Terminal — Advanced</h1>
            <p class="text-slate-400 text-sm mt-1">
                A simulated shell with pipes, redirection, globbing, variables, tab-completion and
                <code class="text-cyan-400">man</code> pages. Type <code class="text-cyan-400">help</code> to get started, or work through the missions on the right.
            </p>
                </div>
                <div class="flex gap-2 text-xs shrink-0">
                    <span class="px-3 py-1 rounded-full border border-emerald-700 bg-emerald-950/40 text-emerald-300">Local simulation</span>
                    <a href="https://github.com/cmatosxp/cybersecurity-lab-simulations#readme" class="px-3 py-1 rounded-full border border-slate-600 text-slate-300 hover:border-cyan-500 hover:text-cyan-300">All labs</a>
                </div>
            </div>
        </header>

        <div class="flex flex-col lg:flex-row gap-4">
            <!-- Terminal -->
            <div id="terminal" class="flex-1 min-w-0 bg-black/80 rounded-lg shadow-2xl border border-slate-700 overflow-hidden flex flex-col h-[78vh]">
                <div class="bg-slate-800 px-3 py-2.5 flex items-center justify-between border-b border-slate-700">
                    <div class="flex space-x-2">
                        <span class="w-3.5 h-3.5 bg-red-500 rounded-full block"></span>
                        <span class="w-3.5 h-3.5 bg-yellow-500 rounded-full block"></span>
                        <span class="w-3.5 h-3.5 bg-green-500 rounded-full block"></span>
                    </div>
                    <span class="text-sm text-slate-400">user@linuxlab: <span id="titlebar-path">~</span></span>
                    <button id="reset-btn" type="button" class="text-xs text-slate-400 hover:text-slate-200 border border-slate-600 rounded px-2 py-0.5">reset</button>
                </div>

                <div id="screen" class="flex-1 p-4 overflow-y-auto text-sm leading-relaxed" role="log" aria-live="polite" aria-label="Terminal output"></div>

                <div class="px-4 py-3 border-t border-slate-700">
                    <div class="flex">
                        <span id="prompt" class="text-emerald-400 mr-2 shrink-0 whitespace-pre"></span>
                        <div class="relative w-full">
                            <span id="input-display" class="whitespace-pre-wrap break-all text-sm"></span><span id="cursor"></span>
                            <input type="text" id="terminal-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" aria-label="Terminal command">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Missions -->
            <aside class="w-full lg:w-80 shrink-0 bg-slate-800 rounded-lg border border-slate-700 shadow-lg flex flex-col h-[78vh]">
                <div class="px-4 py-3 border-b border-slate-700 flex items-center justify-between">
                    <h2 class="font-semibold text-slate-100">Missions</h2>
                    <span id="mission-progress" class="text-xs text-emerald-400"></span>
                </div>
                <div id="missions" class="p-4 overflow-y-auto space-y-3 text-sm"></div>
            </aside>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        // ----------------------------------------------------------------- DOM
        const screenEl   = document.getElementById('screen');
        const inputEl    = document.getElementById('terminal-input');
        const displayEl  = document.getElementById('input-display');
        const promptEl   = document.getElementById('prompt');
        const titlebar   = document.getElementById('titlebar-path');
        const missionsEl = document.getElementById('missions');
        const progressEl = document.getElementById('mission-progress');
        const terminalEl = document.getElementById('terminal');
        const STORAGE_KEY = 'linux-advanced-lab-v2';

        // ------------------------------------------------------------ Filesystem
        // Node: { type:'dir'|'file', children?, content?, perms, owner, group, mtime }
        const now = () => {
            const d = new Date();
            const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            const hh = String(d.getHours()).padStart(2,'0');
            const mm = String(d.getMinutes()).padStart(2,'0');
            return `${months[d.getMonth()]} ${String(d.getDate()).padStart(2,' ')} ${hh}:${mm}`;
        };
        const SEED_TIME = 'Jan 15 09:30';
        const dir  = (children = {}, meta = {}) => ({ type:'dir',  children, perms:'rwxr-xr-x', owner:'user', group:'user', mtime:SEED_TIME, ...meta });
        const file = (content = '', meta = {}) => ({ type:'file', content, perms:'rw-r--r--', owner:'user', group:'user', mtime:SEED_TIME, ...meta });

        function buildFS() {
            return dir({
                home: dir({
                    user: dir({
                        Documents: dir({
                            'notes.txt': file("Shopping list:\n- coffee\n- notebooks\n- USB drive\nRemember to back up the server on Friday.\n"),
                            'todo.txt': file("[ ] Learn pipes\n[ ] Learn redirection\n[x] Learn ls\n[ ] Write a shell script\n"),
                            'report.md': file("# Q1 Report\n\nRevenue is up 12%.\nCosts are down 3%.\nSee notes.txt for follow-ups.\n"),
                        }),
                        Downloads: dir({
                            'archive.zip': file('PK... (binary data)', { perms:'rw-r--r--' }),
                            'installer.sh': file("#!/bin/bash\necho 'Pretend installer running...'\n", { perms:'rwxr-xr-x' }),
                        }),
                        Pictures: dir({
                            'vacation.jpg': file('��� JPEG image data (binary)'),
                            'diagram.png': file('PNG image data (binary)'),
                        }),
                        projects: dir({
                            website: dir({
                                'index.html': file("<!DOCTYPE html>\n<html><body><h1>Hello, world!</h1></body></html>\n"),
                                'style.css': file("body { font-family: sans-serif; margin: 2rem; }\nh1 { color: teal; }\n"),
                                'script.js': file("console.log('hello from script.js');\n"),
                            }),
                            scripts: dir({
                                'backup.sh': file("#!/bin/bash\n# Back up the home directory\ntar -czf backup.tgz ~/\n", { perms:'rwxr-xr-x' }),
                                'hello.py': file("print('Hello from Python!')\n"),
                                'cleanup.sh': file("#!/bin/bash\nrm -f /tmp/*.tmp\n"),
                            }),
                        }),
                        '.bashrc': file("# ~/.bashrc\nalias ll='ls -la'\nexport EDITOR=nano\nexport PS1='\\u@\\h:\\w$ '\n"),
                        '.profile': file("# ~/.profile\nexport PATH=$PATH:$HOME/bin\n"),
                        'readme.txt': file("Welcome to the Linux lab!\nEverything here is simulated and safe to experiment with.\nType 'help' for a list of commands, or 'man ls' to read a manual page.\n"),
                    }),
                }),
                etc: dir({
                    passwd: file("root:x:0:0:root:/root:/bin/bash\nuser:x:1000:1000:Lab User:/home/user:/bin/bash\ndaemon:x:1:1:daemon:/usr/sbin:/usr/sbin/nologin\n"),
                    hosts: file("127.0.0.1\tlocalhost\n127.0.1.1\tlinuxlab\n"),
                    hostname: file("linuxlab\n"),
                    'os-release': file('NAME="Lab Linux"\nVERSION="1.0 (Sandbox)"\nID=lablinux\n'),
                }, { owner:'root', group:'root' }),
                var: dir({
                    log: dir({
                        'syslog': file("Jan 15 09:00 linuxlab systemd[1]: Started Session 1.\nJan 15 09:01 linuxlab kernel: eth0 link up\nJan 15 09:05 linuxlab cron[812]: job finished\n", { owner:'root' }),
                        'auth.log': file("Jan 15 09:00 linuxlab sshd[900]: Accepted password for user\nJan 15 09:32 linuxlab sudo: user : command=/usr/bin/apt\n", { owner:'root' }),
                    }, { owner:'root' }),
                }, { owner:'root', group:'root' }),
                tmp: dir({}, { perms:'rwxrwxrwx' }),
                usr: dir({ bin: dir({}, { owner:'root', group:'root' }) }, { owner:'root', group:'root' }),
            }, { owner:'root', group:'root' });
        }

        // ----------------------------------------------------------- Shell state
        let fsRoot, cwd, env, history, historyIndex, missionState;

        function resetSession(printBanner = true) {
            fsRoot = buildFS();
            cwd = ['home', 'user'];
            env = { USER:'user', HOME:'/home/user', HOSTNAME:'linuxlab', SHELL:'/bin/bash',
                    PATH:'/usr/local/bin:/usr/bin:/bin', PWD:'/home/user', EDITOR:'nano', LANG:'en_US.UTF-8', '?':'0' };
            history = [];
            historyIndex = 0;
            missionState = { pwd:false, lsAll:false, catNotes:false, mkdir:false, redirect:false,
                             pipe:false, chain:false, grep:false, find:false, chmodX:false, manPage:false };
            screenEl.innerHTML = '';
            if (printBanner) {
                printLine("Lab Linux 1.0 (Sandbox)  —  simulated terminal", 'text-emerald-400');
                printLine("Type 'help' for commands, 'man <cmd>' for a manual page, or 'missions' to see your goals.", 'text-slate-400');
                printLine('');
            }
            renderMissions();
            updatePrompt();
        }

        function saveSession() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify({ fsRoot, cwd, env, history, missionState }));
        }

        function restoreSession() {
            try {
                const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
                if (!saved || !saved.fsRoot) return false;
                fsRoot = saved.fsRoot;
                cwd = Array.isArray(saved.cwd) ? saved.cwd : ['home', 'user'];
                env = { ...saved.env, '?': saved.env?.['?'] ?? '0' };
                history = Array.isArray(saved.history) ? saved.history : [];
                historyIndex = history.length;
                missionState = { pwd:false, lsAll:false, catNotes:false, mkdir:false, redirect:false,
                                 pipe:false, chain:false, grep:false, find:false, chmodX:false, manPage:false,
                                 ...(saved.missionState || {}) };
                screenEl.innerHTML = '';
                printLine('Saved advanced shell session restored.', 'text-emerald-400');
                printLine("Type 'missions' to review progress or 'reset' to start over.", 'text-slate-400');
                printLine('');
                renderMissions();
                updatePrompt();
                return true;
            } catch (_) {
                return false;
            }
        }

        // ------------------------------------------------------------ FS helpers
        function segmentsToPath(segs) { return '/' + segs.join('/'); }

        function displayPath(segs) {
            const p = segmentsToPath(segs);
            if (p === '/home/user') return '~';
            if (p.startsWith('/home/user/')) return '~' + p.slice('/home/user'.length);
            return p;
        }

        function resolveSegments(path) {
            let segs;
            if (path === undefined || path === '') return cwd.slice();
            if (path.startsWith('/'))       segs = path.split('/').filter(Boolean);
            else if (path.startsWith('~'))  segs = ['home','user', ...path.slice(1).split('/').filter(Boolean)];
            else                            segs = [...cwd, ...path.split('/').filter(Boolean)];
            const out = [];
            for (const s of segs) {
                if (s === '.' || s === '') continue;
                else if (s === '..') { if (out.length) out.pop(); }
                else out.push(s);
            }
            return out;
        }

        function getNode(path) {
            const segs = resolveSegments(path);
            let node = fsRoot;
            for (const s of segs) {
                if (node.type === 'dir' && node.children[s]) node = node.children[s];
                else return null;
            }
            return node;
        }

        function getParentAndName(path) {
            const segs = resolveSegments(path);
            if (segs.length === 0) return { parent:null, name:'', segs };
            const name = segs[segs.length - 1];
            let node = fsRoot;
            for (let i = 0; i < segs.length - 1; i++) {
                if (node.type === 'dir' && node.children[segs[i]]) node = node.children[segs[i]];
                else return { parent:null, name, segs };
            }
            return { parent: node, name, segs };
        }

        // ------------------------------------------------------------- Tokenizer
        // Produces word tokens or shell operator tokens.
        function tokenize(line) {
            const tokens = [];
            let i = 0, cur = '', has = false, sq = false, dq = false;
            const flush = () => { if (has) { tokens.push({ text: cur, sq, dq }); cur=''; has=false; sq=false; dq=false; } };
            while (i < line.length) {
                const c = line[i];
                if (c === "'") { has = true; sq = true; i++; while (i < line.length && line[i] !== "'") cur += line[i++]; i++; continue; }
                if (c === '"') { has = true; dq = true; i++; while (i < line.length && line[i] !== '"') cur += line[i++]; i++; continue; }
                if (c === ' ' || c === '\t') { flush(); i++; continue; }
                if (c === '&' && line[i+1] === '&') { flush(); tokens.push({ op:'&&' }); i+=2; continue; }
                if (c === '|') { flush(); if (line[i+1] === '|') { tokens.push({ op:'||' }); i+=2; } else { tokens.push({ op:'|' }); i++; } continue; }
                if (c === ';') { flush(); tokens.push({ op:';' }); i++; continue; }
                if (c === '<') { flush(); tokens.push({ op:'<' }); i++; continue; }
                if (c === '>') { flush(); if (line[i+1] === '>') { tokens.push({ op:'>>' }); i+=2; } else { tokens.push({ op:'>' }); i++; } continue; }
                if (c === '2' && line[i+1] === '>' && !has) { flush(); tokens.push({ op:'2>' }); i+=2; continue; }
                cur += c; has = true; i++;
            }
            flush();
            return tokens;
        }

        function expandToken(tok) {
            if (tok.sq) return [tok.text];                 // single quotes: literal
            let s = tok.text;
            s = s.replace(/\$\?/g, env['?'] ?? '0');
            s = s.replace(/\$\{([A-Za-z_][A-Za-z0-9_]*)\}/g, (_, n) => env[n] ?? '');
            s = s.replace(/\$([A-Za-z_][A-Za-z0-9_]*)/g,      (_, n) => env[n] ?? '');
            if (!tok.dq && /[*?]/.test(s)) {
                const matches = glob(s);
                if (matches.length) return matches;
            }
            return [s];
        }

        function glob(pattern) {
            const slash = pattern.lastIndexOf('/');
            const dirPart = slash >= 0 ? pattern.slice(0, slash) || '/' : '.';
            const base    = slash >= 0 ? pattern.slice(slash + 1) : pattern;
            const node = getNode(dirPart);
            if (!node || node.type !== 'dir') return [];
            const re = new RegExp('^' + base.split('').map(ch =>
                ch === '*' ? '.*' : ch === '?' ? '.' : ch.replace(/[.+^${}()|[\]\\]/g, '\\$&')
            ).join('') + '$');
            const hits = Object.keys(node.children)
                .filter(name => (base.startsWith('.') || !name.startsWith('.')) && re.test(name))
                .sort()
                .map(name => slash >= 0 ? `${pattern.slice(0, slash)}/${name}` : name);
            return hits;
        }

        // ---------------------------------------------------------------- Output
        function escapeHTML(s) {
            return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
        }
        function printLine(text = '', cls = '') {
            const div = document.createElement('div');
            div.style.whiteSpace = 'pre-wrap';
            div.style.wordBreak = 'break-word';
            if (cls) div.className = cls;
            div.textContent = text;               // textContent → safe, no HTML injection
            screenEl.appendChild(div);
        }
        function printCommandEcho(raw) {
            const div = document.createElement('div');
            const p = document.createElement('span');
            p.className = 'text-emerald-400';
            p.textContent = promptString() + ' ';
            const c = document.createElement('span');
            c.className = 'text-slate-100';
            c.textContent = raw;
            div.append(p, c);
            screenEl.appendChild(div);
        }
        function scrollBottom() { screenEl.scrollTop = screenEl.scrollHeight; }

        function promptString() { return `user@linuxlab:${displayPath(cwd)}$`; }
        function updatePrompt() {
            promptEl.textContent = promptString();
            titlebar.textContent = displayPath(cwd);
            env.PWD = segmentsToPath(cwd);
        }

        // -------------------------------------------------------------- Commands
        // Each command: (args, stdin) => { out, err, code }
        // args excludes the command name. out/err are strings (no trailing newline required).
        const ok  = (out = '')  => ({ out, err:'', code:0 });
        const bad = (err, code = 1) => ({ out:'', err, code });

        function splitFlags(args) {
            const flags = new Set(); const rest = [];
            for (const a of args) {
                if (a.length > 1 && a[0] === '-' && a[1] !== '-' && !/^-\d/.test(a)) {
                    for (const ch of a.slice(1)) flags.add(ch);
                } else if (a.startsWith('--')) {
                    flags.add(a);
                } else rest.push(a);
            }
            return { flags, rest };
        }

        function permString(node) { return (node.type === 'dir' ? 'd' : '-') + node.perms; }
        function nodeSize(node) { return node.type === 'dir' ? 4096 : node.content.length; }
        function isExec(node) { return node.type === 'file' && node.perms.includes('x'); }

        const commands = {
            help() {
                const groups = [
                    ['Navigation', ['pwd','ls','cd','tree']],
                    ['Reading',    ['cat','less','head','tail','wc','file','stat']],
                    ['Editing',    ['touch','mkdir','rm','rmdir','cp','mv','echo','chmod']],
                    ['Searching',  ['grep','find','sort','uniq']],
                    ['System',     ['whoami','id','uname','hostname','date','ps','df','du','env','export','which','history']],
                    ['Shell',      ['man','clear','missions','help','reset']],
                ];
                let out = 'Available commands (try "man <command>" for details):\n';
                for (const [label, cmds] of groups) {
                    out += `\n  ${label}:\n    ${cmds.join('  ')}\n`;
                }
                out += '\nOperators:  | (pipe)   > >> < (redirection)   ; && || (lists)   * ? (globs)   $VAR $? (variables/status)';
                return ok(out);
            },
            missions() { renderMissions(); return ok('Missions are listed in the panel on the right. Complete them by running the right commands!'); },
            clear() { screenEl.innerHTML = ''; return ok(); },
            reset() { localStorage.removeItem(STORAGE_KEY); resetSession(false); return ok('Session reset. Filesystem restored to its original state.'); },

            pwd() { missionState.pwd = true; checkMissions(); return ok(segmentsToPath(cwd)); },

            whoami() { return ok('user'); },
            id() { return ok('uid=1000(user) gid=1000(user) groups=1000(user),27(sudo)'); },
            hostname() { return ok('linuxlab'); },
            uname(args) {
                const { flags } = splitFlags(args);
                if (flags.has('a')) return ok('Linux linuxlab 6.1.0-lab #1 SMP x86_64 GNU/Linux');
                return ok('Linux');
            },
            date() { return ok(new Date().toString()); },
            env() { return ok(Object.entries(env).map(([k,v]) => `${k}=${v}`).join('\n')); },
            printenv(args) {
                if (args.length) return ok(args.map(k => env[k] ?? '').join('\n'));
                return commands.env([]);
            },
            export(args) {
                for (const a of args) {
                    const eq = a.indexOf('=');
                    if (eq > 0) env[a.slice(0, eq)] = a.slice(eq + 1);
                }
                return ok();
            },
            which(args) {
                if (!args.length) return ok();
                const known = new Set(Object.keys(commands));
                const lines = args.map(a => known.has(a) ? `/usr/bin/${a}` : '');
                const missing = args.some(a => !known.has(a));
                return { out: lines.filter(Boolean).join('\n'), err:'', code: missing ? 1 : 0 };
            },
            history() {
                return ok(history.map((h, i) => `${String(i + 1).padStart(4,' ')}  ${h}`).join('\n'));
            },
            true() { return ok(); },
            false() { return bad('', 1); },

            echo(args) {
                let interpret = false; const parts = [...args];
                if (parts[0] === '-e') { interpret = true; parts.shift(); }
                let s = parts.join(' ');
                if (interpret) s = s.replace(/\\n/g, '\n').replace(/\\t/g, '\t');
                return ok(s);
            },

            ls(args) {
                const { flags, rest } = splitFlags(args);
                const long = flags.has('l');
                const all  = flags.has('a');
                if (all) { missionState.lsAll = true; checkMissions(); }
                const targets = rest.length ? rest : ['.'];

                const fmtEntry = (name, n) => {
                    const suffix = n.type === 'dir' ? '/' : (isExec(n) ? '*' : '');
                    if (long) return `${permString(n)} 1 ${n.owner.padEnd(5)} ${n.group.padEnd(5)} ${String(nodeSize(n)).padStart(6)} ${n.mtime} ${name}${suffix}`;
                    return name + suffix;
                };

                // Split targets into plain files (listed together) and directories.
                const fileEntries = [];
                const dirTargets = [];
                let anyErr = '';
                for (const t of targets) {
                    const node = getNode(t);
                    if (!node) { anyErr += `ls: cannot access '${t}': No such file or directory\n`; continue; }
                    if (node.type === 'file') fileEntries.push([t, node]);
                    else dirTargets.push([t, node]);
                }

                const blocks = [];
                const showHeaders = (fileEntries.length + dirTargets.length) > 1;

                if (fileEntries.length) {
                    fileEntries.sort((a, b) => a[0].localeCompare(b[0]));
                    blocks.push(fileEntries.map(([name, n]) => fmtEntry(name, n)).join(long ? '\n' : '  '));
                }

                for (const [t, node] of dirTargets) {
                    let entries = Object.entries(node.children);
                    if (all) entries = [['.', node], ['..', node], ...entries];
                    entries = entries.filter(([name]) => all || !name.startsWith('.'));
                    entries.sort((a, b) => a[0].replace(/^\./, '').localeCompare(b[0].replace(/^\./, '')));

                    let block = '';
                    if (showHeaders) block += `${t}:\n`;
                    if (long) {
                        const total = entries.reduce((s, [, n]) => s + Math.ceil(nodeSize(n) / 1024), 0);
                        block += `total ${total}\n`;
                        block += entries.map(([name, n]) => fmtEntry(name, n)).join('\n');
                    } else {
                        block += entries.map(([name, n]) => fmtEntry(name, n)).join('  ');
                    }
                    blocks.push(block);
                }
                return { out: blocks.join('\n\n'), err: anyErr.trim(), code: anyErr ? 1 : 0 };
            },

            cd(args) {
                const target = args[0] || '~';
                const node = getNode(target);
                if (!node) return bad(`cd: ${target}: No such file or directory`);
                if (node.type !== 'dir') return bad(`cd: ${target}: Not a directory`);
                cwd = resolveSegments(target);
                updatePrompt();
                return ok();
            },

            tree(args) {
                const start = args[0] || '.';
                const root = getNode(start);
                if (!root) return bad(`tree: ${start}: No such file or directory`);

                        redirOut = next ? expandToken(next)[0] : null;
                        redirAppend = token.op === '>>';
                        if (!next) { printLine('bash: syntax error near unexpected token `newline`', 'text-red-400'); return 2; }
                    } else if (token.op === '<') {
                        const next = segment[++index];
                        redirIn = next ? expandToken(next)[0] : null;
                        if (!next) { printLine('bash: syntax error near unexpected token `newline`', 'text-red-400'); return 2; }
                    } else if (token.op === '2>') {
                        const next = segment[++index];
                        redirErr = next ? expandToken(next)[0] : null;
                        if (!next) { printLine('bash: syntax error near unexpected token `newline`', 'text-red-400'); return 2; }
                    } else {
                        argTokens.push(token);
                    }
                }

                const argv = [];
                for (const token of argTokens) argv.push(...expandToken(token));
                if (!argv.length) continue;
                const cmdName = argv[0];
                const cmdArgs = argv.slice(1);

                if (redirIn !== null) {
                    const inputResult = readFromFile(redirIn);
                    if (inputResult.err) { printLine(inputResult.err, 'text-red-400'); return 1; }
                    stdin = inputResult.content;
                }

                let result;
                if (commands[cmdName]) {
                    try { result = commands[cmdName](cmdArgs, stdin); }
                    catch (error) { result = bad(`${cmdName}: ${error.message}`); }
                } else if (cmdName.includes('=')) {
                    const equals = cmdName.indexOf('=');
                    env[cmdName.slice(0, equals)] = cmdName.slice(equals + 1);
                    result = ok();
                } else {
                    result = bad(`${cmdName}: command not found`, 127);
                }
                exitCode = result.code;

                if (result.err) {
                    if (redirErr !== null) writeToFile(redirErr, result.err + '\n', false);
                    else printLine(result.err, 'text-red-400');
                }

                const output = result.out || '';
                if (redirOut !== null) {
                    const writeError = writeToFile(redirOut, output === '' ? '' : output.replace(/\n?$/, '\n'), redirAppend);
                    if (writeError) { printLine(writeError, 'text-red-400'); exitCode = 1; }
                    stdin = '';
                } else if (segmentIndex < segments.length - 1) {
                    stdin = output;
                } else if (output !== '') {
                    printLine(output);
                }
            }
            return exitCode;
        }

        function runLine(raw) {
            const tokens = tokenize(raw);
            if (!tokens.length) return;
            const lists = [[]];
            const controls = [];
            for (const token of tokens) {
                if (token.op === '&&' || token.op === '||' || token.op === ';') {
                    controls.push(token.op);
                    lists.push([]);
                } else {
                    lists[lists.length - 1].push(token);
                }
            }
            if (lists.some(list => list.length === 0)) {
                printLine('bash: syntax error near unexpected control operator', 'text-red-400');
                env['?'] = '2';
                return;
            }
            if (controls.length) missionState.chain = true;

            let exitCode = 0;
            for (let index = 0; index < lists.length; index++) {
                const previous = controls[index - 1];
                if (index > 0 && previous === '&&' && exitCode !== 0) continue;
                if (index > 0 && previous === '||' && exitCode === 0) continue;
                exitCode = runPipelineTokens(lists[index]);
                // Bash expands $? when each command list executes, so later
                // commands on the same line see the immediately preceding status.
                env['?'] = String(exitCode);
            }
            env['?'] = String(exitCode);
            checkMissions();
        }

        // -------------------------------------------------------------- Missions
        const MISSIONS = [
            { key:'pwd',      text:'Print your current working directory.',                       hint:'pwd' },
            { key:'lsAll',    text:'List all files, including hidden ones.',                       hint:'ls -a' },
            { key:'catNotes', text:'Read the contents of Documents/notes.txt.',                   hint:'cat ~/Documents/notes.txt' },
            { key:'manPage',  text:'Open a manual page for any command.',                          hint:'man grep' },
            { key:'mkdir',    text:'Create a new directory.',                                      hint:'mkdir sandbox' },
            { key:'redirect', text:'Write text to a new file using redirection.',                 hint:'echo "hi" > hello.txt' },
            { key:'grep',     text:'Search for text inside a file with grep.',                    hint:'grep coffee ~/Documents/notes.txt' },
            { key:'pipe',     text:'Chain two commands together with a pipe.',                    hint:'cat ~/Documents/todo.txt | wc -l' },
            { key:'chain',    text:'Use exit status to conditionally run another command.',       hint:'false || echo recovered' },
            { key:'find',     text:'Find a file somewhere in the filesystem.',                    hint:"find / -name '*.sh'" },
            { key:'chmodX',   text:'Make a file executable with chmod.',                          hint:'chmod +x ~/projects/scripts/hello.py' },
        ];
        function renderMissions() {
            missionsEl.innerHTML = '';
            let done = 0;
            for (const m of MISSIONS) {
                const complete = !!missionState[m.key];
                if (complete) done++;
                const wrap = document.createElement('div');
                wrap.className = 'flex items-start gap-2';
                const box = document.createElement('span');
                box.className = complete ? 'text-emerald-400 shrink-0' : 'text-slate-500 shrink-0';
                box.textContent = complete ? '✓' : '○';
                const body = document.createElement('div');
                const t = document.createElement('div');
                t.className = complete ? 'mission-done text-slate-200' : 'text-slate-200';
                t.textContent = m.text;
                const h = document.createElement('div');
                h.className = 'text-xs text-slate-500 mt-0.5';
                h.textContent = 'try: ' + m.hint;
                body.append(t, h);
                wrap.append(box, body);
                missionsEl.appendChild(wrap);
            }
            progressEl.textContent = `${done}/${MISSIONS.length}`;
            if (done === MISSIONS.length) {
                const banner = document.createElement('div');
                banner.className = 'mt-2 p-2 rounded bg-emerald-900/40 border border-emerald-700 text-emerald-300 text-center font-medium';
                banner.textContent = '🎉 All missions complete!';
                missionsEl.appendChild(banner);
            }
        }
        let lastDone = 0;
        function checkMissions() {
            const done = MISSIONS.filter(m => missionState[m.key]).length;
            renderMissions();
            if (done > lastDone) { /* could add a sound/flash here */ }
            lastDone = done;
        }

        // -------------------------------------------------------- Tab completion
        function completeInput() {
            const value = inputEl.value;
            const parts = value.split(' ');
            const last = parts[parts.length - 1];

            if (parts.length === 1) {
                const matches = Object.keys(commands).filter(c => c.startsWith(last)).sort();
                if (matches.length === 1) { setInput(matches[0] + ' '); }
                else if (matches.length > 1) { printCommandEcho(value); printLine(matches.join('  ')); }
                return;
            }
            // path completion on the last token
            const slash = last.lastIndexOf('/');
            const dirPart = slash >= 0 ? last.slice(0, slash + 1) : '';
            const frag = slash >= 0 ? last.slice(slash + 1) : last;
            const lookup = dirPart === '' ? '.' : dirPart;
            const node = getNode(lookup);
            if (!node || node.type !== 'dir') return;
            const matches = Object.keys(node.children)
                .filter(n => n.startsWith(frag) && (frag.startsWith('.') || !n.startsWith('.')))
                .sort();
            if (matches.length === 1) {
                const child = node.children[matches[0]];
                const completed = dirPart + matches[0] + (child.type === 'dir' ? '/' : ' ');
                parts[parts.length - 1] = completed;
                setInput(parts.join(' '));
            } else if (matches.length > 1) {
                printCommandEcho(value);
                printLine(matches.map(m => m + (node.children[m].type === 'dir' ? '/' : '')).join('  '));
            }
        }

        // ------------------------------------------------------------- I/O wiring
        function setInput(val) {
            inputEl.value = val;
            displayEl.textContent = val;
            setTimeout(() => inputEl.setSelectionRange(val.length, val.length), 0);
        }
        function focusInput() { inputEl.focus(); }

        inputEl.addEventListener('input', () => { displayEl.textContent = inputEl.value; });

        inputEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                const raw = inputEl.value;
                printCommandEcho(raw);
                const trimmed = raw.trim();
                if (trimmed) {
                    if (history[history.length - 1] !== trimmed) history.push(trimmed);
                    historyIndex = history.length;
                    try { runLine(trimmed); saveSession(); } catch (err) { printLine('Error: ' + err.message, 'text-red-400'); }
                }
                setInput('');
                scrollBottom();
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (historyIndex > 0) { historyIndex--; setInput(history[historyIndex]); }
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (historyIndex < history.length - 1) { historyIndex++; setInput(history[historyIndex]); }
                else { historyIndex = history.length; setInput(''); }
            } else if (e.key === 'Tab') {
                e.preventDefault();
                completeInput();
                scrollBottom();
            } else if (e.key === 'l' && e.ctrlKey) {
                e.preventDefault();
                screenEl.innerHTML = '';
            } else if (e.key === 'c' && e.ctrlKey) {
                e.preventDefault();
                printCommandEcho(inputEl.value + '^C');
                setInput('');
            }
        });

        terminalEl.addEventListener('click', () => { if (window.getSelection().toString() === '') focusInput(); });
        document.getElementById('reset-btn').addEventListener('click', () => {
            if (window.confirm('Reset the simulated filesystem and all mission progress?')) {
                localStorage.removeItem(STORAGE_KEY);
                resetSession(true);
            }
            focusInput();
        });

        // ------------------------------------------------------------------ Boot
        if (!restoreSession()) resetSession(true);
        focusInput();
    });
    </script>
</body>
</html>
